name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build using the SAME Dockerfile path Railway uses
      - name: Build Docker image
        run: docker build -f backend/Dockerfile -t djs-server .

      - name: Run container
        run: docker run -d --name djs_test -p 3000:3000 -e PORT=3000 djs-server

      - name: Wait for startup
        run: sleep 15

      - name: Show container logs
        run: docker logs djs_test

      - name: Healthcheck
        run: |
          curl -f http://localhost:3000/health || (docker logs djs_test && exit 1)

      - name: Stop container
        if: always()
        run: docker stop djs_test || true
