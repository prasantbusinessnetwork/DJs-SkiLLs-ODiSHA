[phases.setup]
aptPkgs = ["ffmpeg", "python3", "python3-pip", "wget"]

[phases.install]
cmds = [
  "npm install",
  "wget -q https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp",
  "chmod a+rx /usr/local/bin/yt-dlp",
  "pip install -U bgutil-ytdlp-pot-provider --break-system-packages",
  "python3 -c \"import os,subprocess,bgutil_ytdlp_pot_provider; srv=os.path.join(os.path.dirname(bgutil_ytdlp_pot_provider.__file__),'server'); subprocess.run(['npm','install'],cwd=srv); subprocess.run(['npm','run','build'],cwd=srv)\" || true",
  "yt-dlp --version"
]

[start]
cmd = "npm start"
