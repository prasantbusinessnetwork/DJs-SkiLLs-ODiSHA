[phases.setup]
aptPkgs = ["ffmpeg", "python3", "python3-pip", "wget"]

[phases.install]
cmds = [
  "npm install",
  "wget -q https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp",
  "chmod a+rx /usr/local/bin/yt-dlp",
  "pip install -U bgutil-ytdlp-pot-provider --break-system-packages",
  "yt-dlp --version"
]

[start]
cmd = "npm start"
