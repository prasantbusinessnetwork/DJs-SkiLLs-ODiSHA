[phases.setup]
aptPkgs = ["ffmpeg", "python3", "python3-pip", "wget", "git"]

[phases.install]
cmds = [
  "npm install",
  "wget -q https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp",
  "chmod a+rx /usr/local/bin/yt-dlp",
  "pip install -U bgutil-ytdlp-pot-provider --break-system-packages",
  "rm -rf bgutil-server-src || true",
  "git clone https://github.com/v8u1i/bgutil-ytdlp-pot-provider.git bgutil-server-src",
  "cd bgutil-server-src/server && npm install && npm run build",
  "yt-dlp --version"
]
[start]
cmd = "npm start"
