[phases.setup]
aptPkgs = ["ffmpeg", "python3", "python3-pip", "wget", "unzip"]

[phases.install]
cmds = [
  "npm install",
  "wget -q https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp",
  "chmod a+rx /usr/local/bin/yt-dlp",
  "pip install -U bgutil-ytdlp-pot-provider --break-system-packages",
  "wget -q https://github.com/v8u1i/bgutil-ytdlp-pot-provider/archive/refs/heads/main.zip -O bgutil.zip && unzip bgutil.zip && mv bgutil-ytdlp-pot-provider-main bgutil-server && rm bgutil.zip && cd bgutil-server/server && (npm install && npm run build || echo 'skip') || echo 'failed'",
  "yt-dlp --version"
]

[start]
cmd = "npm start"
